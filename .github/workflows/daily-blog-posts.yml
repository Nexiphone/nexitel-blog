name: Daily blog posts

on:
  # 13:31 UTC ~ 9:31 AM Eastern. Off-the-hour to avoid the cron stampede.
  schedule:
    - cron: '31 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-blog-posts
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm install --no-save @anthropic-ai/sdk

      - name: Generate daily blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/generate-daily-posts.mjs

      - name: Commit and push new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/
          if git diff --cached --quiet; then
            echo "No new posts to commit."
          else
            git commit -m "add: 2 daily blog posts in EN/ZH/ES for $(date -u +%Y-%m-%d)"
            git push
          fi
