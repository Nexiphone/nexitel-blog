name: Daily promo post

on:
  # 21:17 UTC ~ 5:17 PM Eastern. Off-the-hour to avoid the cron stampede.
  schedule:
    - cron: '17 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-promo-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --no-audit --no-fund

      - name: Send Telegram promos
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_EN: ${{ secrets.TELEGRAM_CHAT_ID_EN }}
          TELEGRAM_CHAT_ID_ZH: ${{ secrets.TELEGRAM_CHAT_ID_ZH }}
          TELEGRAM_CHAT_ID_ES: ${{ secrets.TELEGRAM_CHAT_ID_ES }}
        run: npm run post:promo

      - name: Commit updated promo-log
        run: |
          if ! git diff --quiet -- scripts/promo-log.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/promo-log.json
            git commit -m "chore: record promo posts for $(date -u +%Y-%m-%d)"
            git push
          else
            echo "promo-log.json unchanged; nothing to commit."
          fi
